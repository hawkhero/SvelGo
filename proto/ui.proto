syntax = "proto3";
package ui;
option go_package = "svelgo/gen/ui";

// Initial page state — base64-encoded and injected into the HTML shell
message PageState {
  string page_id = 1;
  repeated ComponentState components = 2;
}

// One component's serialized state (state_bytes is the component-specific proto)
message ComponentState {
  string id          = 1;
  string type        = 2;
  bytes  state_bytes = 3;
}

// Client → Server: user interaction event
message ClientEvent {
  string page_id      = 1;
  string component_id = 2;
  string event_type   = 3;
  bytes  payload      = 4;
}

// Server → Client: state patch after handling an event
message StateUpdate {
  string page_id                          = 1;
  repeated ComponentState updated_components = 2;
}

// ── Component-specific state messages ──────────────────────────────────────

message ButtonState {
  string label       = 1;
  int32  click_count = 2;
}
